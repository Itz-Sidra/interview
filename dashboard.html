<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - Evalvate</title>
    <meta
      name="description"
      content="Evalvate dashboard: review interview sessions and AI performance summaries."
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/glassmorphism.css" />
    <link rel="stylesheet" href="css/dashboard-glass.css" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "deep-navy": "#0F2233",
              "pale-frost": "#EEF3FF",
              periwinkle: "#E6EEFF",
              "lavender-tint": "#C7D5FF",
              accent: "#F3F86A",
              body: "#5A6B7A",
            },
          },
        },
      };
    </script>
  </head>

  <body class="antialiased">
    <div class="floating-shape shape-1"></div>
    <div class="floating-shape shape-2"></div>
    <div class="floating-shape shape-3"></div>

    <nav id="navbar" class="fixed top-0 left-0 right-0 z-50">
      <div class="container mx-auto px-6 py-4">
        <div class="flex items-center justify-between">
          <div class="flex items-center space-x-2">
            <div
              class="w-10 h-10 bg-gradient-to-br from-deep-navy to-accent rounded-xl flex items-center justify-center"
            >
              <span class="text-white font-bold text-xl">E</span>
            </div>
            <span class="text-2xl font-bold font-space text-deep-navy"
              >Evalvate</span
            >
          </div>

          <div class="hidden lg:flex items-center space-x-8">
            <a
              href="index.html"
              class="text-body hover:text-deep-navy transition-colors font-medium"
              >Home</a
            >
            <a href="dashboard.html" class="text-deep-navy font-semibold"
              >Dashboard</a
            >
            <a
              href="pricing.html"
              class="text-body hover:text-deep-navy transition-colors font-medium"
              >Pricing</a
            >
            <a
              href="blogs.html"
              class="text-body hover:text-deep-navy transition-colors font-medium"
              >Blogs</a
            >
            <a
              href="#contact.html"
              class="text-body hover:text-deep-navy transition-colors font-medium"
              >Contact</a
            >
          </div>

          <div class="hidden lg:flex items-center space-x-4">
            <a href="login.html" class="btn-secondary">Log in</a>
            <a href="signup.html" class="btn-primary">
              <span>Sign up</span>
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M5 12h14M12 5l7 7-7 7" />
              </svg>
            </a>
          </div>
        </div>
      </div>
    </nav>

    <main class="dash-wrap">
      <div class="dash-container">
        <div
          class="flex flex-col lg:flex-row lg:items-end lg:justify-between gap-14"
        >
          <div>
            <h1 class="dash-title text-4xl md:text-5xl">Dashboard</h1>
            <p class="dash-subtitle mt-3 max-w-2xl">
              Analyze and review candidate interviews with AI-powered insights.
            </p>
          </div>

          <div class="glass-card dash-search w-full lg:w-[420px]">
            <svg
              class="w-5 h-5"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              style="color: rgba(15, 34, 51, 0.65)"
            >
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input
              type="text"
              placeholder="Search interviews by name or role..."
              id="searchInput"
              aria-label="Search interviews"
            />
          </div>
        </div>

        <div class="stats-grid">

  <!-- Total Interviews -->
  <div class="glass-card stat-card">
    <div class="stat-icon">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
      </svg>
    </div>
    <div class="stat-content">
      <h2 id="kpiTotal">0</h2>
      <p>Total Interviews</p>
    </div>
  </div>

  <!-- Avg Score -->
  <div class="glass-card stat-card">
    <div class="stat-icon">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
      </svg>
    </div>
    <div class="stat-content">
      <h2 id="kpiAvgScore">0</h2>
      <p>Avg Score</p>
    </div>
  </div>

  <!-- Issues Flagged -->
  <div class="glass-card stat-card">
    <div class="stat-icon">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M12 9v2m0 4h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
      </svg>
    </div>
    <div class="stat-content">
      <h2 id="kpiIssues">0</h2>
      <p>Issues Flagged</p>
    </div>
  </div>

  <!-- Total Duration -->
  <div class="glass-card stat-card">
    <div class="stat-icon">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
    </div>
    <div class="stat-content">
      <h2 id="kpiDuration">0m</h2>
      <p>Total Duration</p>
    </div>
  </div>

</div>

        <section class="glass-card interviews-section">
          <div class="section-header">
            <svg
              class="section-icon"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              stroke-width="2"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"
              ></path>
            </svg>
            Recent Interviews
          </div>

          <div id="interviewsContainer"></div>
        </section>
      </div>
    </main>
    <script src="dashboard.js"></script>
    <script>
      // Search functionality (by name or role)
      const searchInput = document.getElementById("searchInput");
      searchInput.addEventListener("input", (e) => {
        const searchTerm = e.target.value.toLowerCase();
        const interviewCards = document.querySelectorAll(".interview-card");

        interviewCards.forEach((card) => {
          const name =
            card.querySelector("h3")?.textContent?.toLowerCase() || "";
          const role =
            card.querySelector("h2")?.textContent?.toLowerCase() || "";

          if (name.includes(searchTerm) || role.includes(searchTerm)) {
            card.style.display = "flex";
          } else {
            card.style.display = "none";
          }
        });
      });
    </script>
  </body>
</html>
