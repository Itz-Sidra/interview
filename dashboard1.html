<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Report | Evalvate</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/glassmorphism.css" />
    <link rel="stylesheet" href="css/report-glass.css" />
</head>
<body class="antialiased">
    <div class="floating-shape shape-1"></div>
    <div class="floating-shape shape-2"></div>
    <div class="floating-shape shape-3"></div>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <div class="header-left">
                <a href="index.html" class="home-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                    Home
                </a>
                <a href="dashboard.html" class="back-link">← Back to Dashboard</a>
                <div class="user-info">
                    <h1 id="candidateName"></h1>
                    <p class="timestamp" id="interviewDate"></p>
                </div>
            </div>
            <div class="header-right">
                <button class="btn-icon">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    Export PDF
                </button>
                <button class="btn-icon">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path>
                        <polyline points="16 6 12 2 8 6"></polyline>
                        <line x1="12" y1="2" x2="12" y2="15"></line>
                    </svg>
                    Share Report
                </button>
                <button class="btn-icon">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>
                </button>
            </div>
        </header>

        <div class="main-content">
            <div class="left-column">
                <div class="performance-card">
                    <div class="score-circle">
                        <div class="score-number" id="overallScore"></div>
                        <div class="score-label">Score</div>
                    </div>
                    <div class="performance-info">
                        <h2>Overall Performance</h2>
                        <p>Comprehensive analysis across all evaluation criteria</p>
                        <div class="rating">
                            <span class="star">⭐</span>
                            <span>Excellent</span>
                        </div>
                    </div>
                    <div class="score-display">
                        <div class="score-large" id="overallScoreLarge"></div>
                        <div class="score-max">/ 100</div>
                    </div>
                </div>

                <div class="metrics-grid" id="metricsGrid"></div>

                <div class="video-container">
                    <video id="videoPlayer" controls poster="assests/thumbnail.jpg">
                        <source src="sample-video.mp4" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                    <div class="video-overlay" id="videoOverlay">
                        <button class="play-button" id="playButton">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="white">
                                <polygon points="5 3 19 12 5 21 5 3"></polygon>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>

            <div class="right-column">
                <div class="flagged-section">
                    <h3 id="flaggedTitle"></h3>
                    <div id="flaggedContainer"></div>
                </div>

                
                <div class="assessment-section">
                        <h3>Technical Assessment</h3>
                        <div id="technicalContainer"></div>
                    </div>
                    

                
                <div class="actions-section">
                    <h3>Actions</h3>
                    <div class="actions-grid">
                        <button class="action-button">Generate Report</button>
                        <button class="action-button">Schedule Follow-up</button>
                        <button class="action-button">Send Feedback</button>
                        <button class="action-button">Export Data</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="dashboard1.js"></script>
    <script type="module" src="js/auth-core.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module">
        import AuthCore from "./js/auth-core.js";
        AuthCore.requireAuth();  // redirects to login.html if not logged in
    </script>
</body>
</html>
