<!--
  ╔══════════════════════════════════════════════════════════════════╗
  ║  SHARED NAVBAR SNIPPET  (navbar-shared.html)                    ║
  ║                                                                  ║
  ║  Paste this <nav> block into every page that needs a consistent  ║
  ║  navbar.  auth-core.js fills in all the dynamic parts            ║
  ║  automatically on DOMContentLoaded.                              ║
  ║                                                                  ║
  ║  Required scripts at bottom of <body>:                           ║
  ║    <script type="module" src="js/auth-core.js"></script>         ║
  ║    <script type="module" src="js/auth.js"></script>              ║
  ╚══════════════════════════════════════════════════════════════════╝

  HOW IT WORKS
  ────────────
  • id="loggedOutNav"  → shown when NOT logged in  (Login / Sign up buttons)
  • id="loggedInNav"   → shown when logged in       (avatar + dropdown)
  • id="navAvatarInitials" → filled with real initials by auth-core.js
  • id="navUserName" / id="navUserEmail" → filled from localStorage
  • id="navCreditsDisplay" → filled from localStorage credits
  • id="navLogoutBtn"  → wired to AuthCore.logout() by auth-core.js

  ACTIVE PAGE
  ───────────
  Add class="font-semibold text-deep-navy" to the <a> matching the
  current page.  Remove it from all others.
-->

<nav id="navbar" class="fixed top-0 left-0 right-0 z-50">
  <div class="container mx-auto px-6 py-4">
    <div class="flex items-center justify-between">

      <!-- Logo -->
      <a href="index.html" class="flex items-center space-x-2">
        <div class="w-10 h-10 bg-gradient-to-br from-deep-navy to-accent rounded-xl flex items-center justify-center">
          <span class="text-white font-bold text-xl">E</span>
        </div>
        <span class="text-2xl font-bold font-space text-deep-navy">Evalvate</span>
      </a>

      <!-- Desktop links -->
      <div class="hidden lg:flex items-center space-x-8">
        <a href="index.html"          class="text-body hover:text-deep-navy transition-colors font-medium">Home</a>
        <a href="dashboard-home.html" class="text-body hover:text-deep-navy transition-colors font-medium">Dashboard</a>
        <a href="pricing.html"        class="text-body hover:text-deep-navy transition-colors font-medium">Pricing</a>
        <a href="blogs.html"          class="text-body hover:text-deep-navy transition-colors font-medium">Blogs</a>
        <a href="contact.html"        class="text-body hover:text-deep-navy transition-colors font-medium">Contact</a>
      </div>

      <!-- Desktop right: logged-OUT state -->
      <div class="hidden lg:flex items-center space-x-4" id="loggedOutNav">
        <a href="login.html"  class="btn-secondary">Log in</a>
        <a href="signup.html" class="btn-primary">
          <span>Sign up</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </a>
      </div>

      <!-- Desktop right: logged-IN state -->
      <div class="hidden lg:flex items-center space-x-4" id="loggedInNav" style="display:none !important">

        <!-- Credits badge -->
        <div class="credits-badge hidden md:flex" id="navCreditsBadge">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
          </svg>
          <span id="navCreditsDisplay">0</span>&nbsp;Credits
        </div>

        <!-- Avatar + dropdown -->
        <div class="relative" id="avatarWrapper">
          <div
            id="navProfileAvatar"
            class="w-10 h-10 rounded-full bg-gradient-to-br from-deep-navy to-accent flex items-center justify-center text-white font-semibold text-sm cursor-pointer border-2 border-white/20 hover:border-accent transition-all select-none"
            title="Account"
          >
            <!-- Filled by auth-core.js -->
            <span id="navAvatarInitials">U</span>
          </div>

          <!-- Dropdown -->
          <div
            id="navDropdownMenu"
            class="dropdown-menu absolute top-full right-0 mt-2 w-64 bg-white/95 backdrop-blur-xl rounded-xl shadow-lg border border-white/20 opacity-0 invisible transform -translate-y-2 transition-all z-50"
          >
            <!-- User info -->
            <div class="p-4 border-b border-gray-100">
              <p class="font-semibold text-deep-navy" id="navUserName">User</p>
              <p class="text-sm text-body"            id="navUserEmail">user@email.com</p>
            </div>

            <!-- Credits & plan -->
            <div class="p-4 bg-accent/10">
              <div class="flex items-center justify-between mb-1">
                <span class="text-sm text-body">Remaining credits</span>
                <span class="text-sm font-semibold text-deep-navy" id="navCreditsDropdown">0</span>
              </div>
              <a href="pricing.html" class="block mt-2 text-center text-sm font-semibold text-deep-navy hover:text-accent transition-colors">
                Upgrade →
              </a>
            </div>

            <!-- Links -->
            <div class="p-2">
              <a href="dashboard-home.html" class="flex items-center gap-3 px-3 py-2 text-sm text-deep-navy hover:bg-gray-50 rounded-lg transition-colors">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="3" width="18" height="18" rx="2"/>
                  <line x1="3" y1="9" x2="21" y2="9"/>
                </svg>
                Dashboard
              </a>
              <a href="dashboard.html" class="flex items-center gap-3 px-3 py-2 text-sm text-deep-navy hover:bg-gray-50 rounded-lg transition-colors">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
                  <rect x="9" y="3" width="6" height="4" rx="1"/>
                </svg>
                Interview History
              </a>
            </div>

            <div class="p-2 border-t border-gray-100">
              <button
                id="navLogoutBtn"
                class="w-full flex items-center gap-3 px-3 py-2 text-sm text-red-500 hover:bg-red-50 rounded-lg transition-colors"
              >
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
                  <polyline points="16 17 21 12 16 7"/>
                  <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                Logout
              </button>
            </div>
          </div><!-- /navDropdownMenu -->
        </div><!-- /avatarWrapper -->
      </div><!-- /loggedInNav -->

      <!-- Mobile menu button -->
      <button id="mobile-menu-btn" class="lg:hidden p-2 rounded-lg hover:bg-white/10 transition-colors">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 12h18M3 6h18M3 18h18"/>
        </svg>
      </button>

    </div><!-- /flex row -->
  </div><!-- /container -->

  <!-- Mobile dropdown -->
  <div id="mobile-menu" class="lg:hidden hidden absolute top-full left-0 right-0 bg-white/95 backdrop-blur-xl border-t border-white/20">
    <div class="container mx-auto px-6 py-4 flex flex-col space-y-4">
      <a href="index.html"          class="text-body hover:text-deep-navy font-medium py-2">Home</a>
      <a href="dashboard-home.html" class="text-body hover:text-deep-navy font-medium py-2">Dashboard</a>
      <a href="pricing.html"        class="text-body hover:text-deep-navy font-medium py-2">Pricing</a>
      <a href="blogs.html"          class="text-body hover:text-deep-navy font-medium py-2">Blogs</a>
      <a href="contact.html"        class="text-body hover:text-deep-navy font-medium py-2">Contact</a>

      <!-- Logged OUT -->
      <div id="mobileLoggedOutNav" class="flex flex-col space-y-3 pt-4 border-t border-white/20">
        <a href="login.html"  class="btn-secondary text-center">Log in</a>
        <a href="signup.html" class="btn-primary text-center">Sign up</a>
      </div>

      <!-- Logged IN -->
      <div id="mobileLoggedInNav" class="flex flex-col space-y-3 pt-4 border-t border-white/20" style="display:none">
        <a href="dashboard-home.html" class="btn-primary text-center">Go to Dashboard</a>
        <button id="mobileLogoutBtn" class="btn-secondary text-center">Logout</button>
      </div>
    </div>
  </div>

</nav>

<!--
  ─── REQUIRED SCRIPTS (paste before </body> on every page) ────────

  <script type="module" src="js/auth-core.js"></script>
  <script type="module" src="js/auth.js"></script>

  ─── MOBILE MENU TOGGLE (add once per page) ────────────────────────

  <script>
    document.getElementById("mobile-menu-btn")?.addEventListener("click", () => {
      document.getElementById("mobile-menu")?.classList.toggle("hidden");
    });
  </script>
-->
